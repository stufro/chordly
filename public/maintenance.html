<!DOCTYPE html>
<html lang="en">
<head>
  <title>Chordly – Down for Maintenance</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png">
  <meta name="theme-color" content="#80475E">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', 'Segoe UI', Arial, sans-serif;
      background-color: #f5f5f5;
      color: #393947;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      background-color: #80475E;
      padding: 0 1rem;
      height: 52px;
      display: flex;
      align-items: center;
    }

    nav a {
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      text-decoration: none;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      max-width: 480px;
      width: 100%;
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #80475E;
      margin-bottom: 0.75rem;
    }

    p {
      color: #555562;
      line-height: 1.6;
      font-size: 1rem;
    }

    .tag {
      display: inline-block;
      background-color: #f0e6eb;
      color: #80475E;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-radius: 4px;
      padding: 0.25rem 0.6rem;
      margin-bottom: 1.25rem;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.85rem;
      color: #9F9FA8;
    }

    footer strong {
      color: #555562;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/">Chordly</a>
  </nav>

  <main>
    <div class="card">
      <div class="icon">🎸</div>
      <div class="tag">Maintenance</div>
      <h1>We'll be back in a few minutes</h1>
      <p>Chordly is currently undergoing scheduled maintenance. We'll be back up and running very soon — thanks for your patience!</p>
    </div>
  </main>

  <footer>
    <strong>Chordly</strong> &mdash; A free, open-source, online chord sheet creator
  </footer>
</body>
</html>
