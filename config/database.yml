default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: db/<%= ENV['CYPRESS'] ? 'test' : 'development' %>.sqlite3

test:
  <<: *default
  database: db/test.sqlite3

production:
  <<: *default
  database: /data/production.sqlite3
